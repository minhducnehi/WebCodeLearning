<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Elearning Phantom - Access System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../Css/User/style.css">
</head>
<body class="light-off">

    <!-- ===== CÂY ĐÈN PHANTOM ===== -->
    <div class="lamp-wrapper">
        <div class="lamp-container" id="lamp" onclick="toggleLight()">

            <!-- Hạt sáng bay lên -->
            <div class="particles-container">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>

            <!-- Chao đèn + Mặt -->
            <div class="lamp-shade">
                <div class="lamp-face">
                    <div class="eyes-container">
                        <div class="eye eye-left">
                            <div class="pupil" id="pupil-left"></div>
                        </div>
                        <div class="eye eye-right">
                            <div class="pupil" id="pupil-right"></div>
                        </div>
                    </div>
                    <div class="mouth"></div>
                </div>
            </div>

            <!-- Thân đèn -->
            <div class="lamp-stand"></div>

            <!-- Đế đèn -->
            <div class="lamp-base"></div>
        </div>

        <!-- Ánh sáng xuống sàn -->
        <div class="lamp-glow-floor"></div>

        <!-- Gợi ý click -->
        <span class="lamp-hint">[ click me ]</span>
    </div>

    <!-- ===== GIAO DIỆN CHÍNH ===== -->
    <div class="main-interface">
        <div class="phantom-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>

            <div class="glass-card">
                <div class="card-header">
                    <div class="logo">
                        <img src="../../images/logo_phantom.png" alt="Logo Phantom" class="brand-logo-img">
                        <span class="brand-name">Code Elearning Phantom</span>
                    </div>
                    <p id="form-title">Decrypting Knowledge</p>
                </div>

                <!-- Form Đăng Nhập -->
                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="login-identifier" placeholder="Username / Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="login-password" placeholder="Access Code" required>
                    </div>
                    <button type="submit" class="btn-main">Access System</button>
                    <div class="form-footer">
                        <p>New Student? <a href="#" onclick="toggleForm(); return false;">Create Identity</a></p>
                    </div>
                </form>

                <!-- Form Đăng Ký -->
                <form id="signup-form" class="auth-form hidden">
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="signup-fullname" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Secure Password" required>
                    </div>
                    <button type="submit" class="btn-main">Begin Journey</button>
                    <div class="form-footer">
                        <p>Already a Member? <a href="#" onclick="toggleForm(); return false;">Login Now</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           === BẬT / TẮT ĐÈN ===
           ========================================= */
        function toggleLight() {
            document.body.classList.toggle('light-off');
        }

        /* =========================================
           === CHUYỂN FORM ===
           ========================================= */
        function toggleForm() {
            const loginForm  = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const title      = document.getElementById('form-title');

            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');

            title.innerText = loginForm.classList.contains('hidden')
                ? "Join the Academy"
                : "Decrypting Knowledge";
        }

        /* =========================================
           === MẮT NHÌN THEO CHUỘT ===
           ========================================= */
        const lampEl     = document.getElementById('lamp');
        const pupilLeft  = document.getElementById('pupil-left');
        const pupilRight = document.getElementById('pupil-right');

        document.addEventListener('mousemove', (e) => {
            [pupilLeft, pupilRight].forEach(pupil => {
                const eye    = pupil.parentElement;
                const rect   = eye.getBoundingClientRect();
                const eyeCX  = rect.left + rect.width  / 2;
                const eyeCY  = rect.top  + rect.height / 2;
                const dx     = e.clientX - eyeCX;
                const dy     = e.clientY - eyeCY;
                const angle  = Math.atan2(dy, dx);
                const dist   = Math.min(Math.hypot(dx, dy), 5); // giới hạn bán kính
                const px     = Math.cos(angle) * dist;
                const py     = Math.sin(angle) * dist;
                pupil.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
            });
        });

        /* =========================================
           === NHẮM MẮT TỰ ĐỘNG (BLINK) ===
           ========================================= */
        function scheduleBlink() {
            const delay = 2500 + Math.random() * 3500; // 2.5 – 6 giây

            setTimeout(() => {
                lampEl.classList.add('blinking');

                setTimeout(() => {
                    lampEl.classList.remove('blinking');
                    scheduleBlink(); // lên lịch lần tiếp theo
                }, 150); // nhắm 150ms

            }, delay);
        }

        scheduleBlink();

        /* =========================================
           === API XỬ LÝ ĐĂNG NHẬP / ĐĂNG KÝ ===
           ========================================= */
        const backendUrl = 'http://localhost:5000/api/auth';

        // Đăng ký
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('signup-fullname').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const response = await fetch(`${backendUrl}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Đăng ký thành công! Hãy đăng nhập lại.');
                    toggleForm(); // Chuyển sang form đăng nhập
                } else {
                    alert(`Lỗi: ${data.error}`);
                }
            } catch (err) {
                console.error(err);
                alert('Lỗi kết nối đến máy chủ.');
            }
        });

        // Đăng nhập
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('login-identifier').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${backendUrl}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Đăng nhập thành công!');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Chuyển hướng đến trang chủ hoặc khóa học
                    window.location.href = 'TrangChu.html';
                } else {
                    alert(`Lỗi: ${data.error}`);
                }
            } catch (err) {
                console.error(err);
                alert('Lỗi kết nối đến máy chủ.');
            }
        });
    </script>
</body>
</html>
